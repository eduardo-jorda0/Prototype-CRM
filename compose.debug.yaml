services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: prototype_crm
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  backend:
    image: backend
    build:
      context: backend
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres:postgrespassword@db:5432/prototype_crm?schema=public"
      JWT_SECRET: "super-secret-jwt-key-prototype-crm-2026"
      UPLOAD_DIR: "./uploads"
      PORT: 5000
    depends_on:
      - db
    ports:
      - 5000:5000
      - 9229:9229
    command: ["node", "--inspect=0.0.0.0:9229", "dist/index.js"]
volumes:
  db_data:
